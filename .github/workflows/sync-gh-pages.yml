name: Sync gh-pages to OSS

on:
  workflow_run:
    workflows: ["Deploy Docusaurus site to GitHub Pages"]  # deploy.yml workflow 名称
    types:
      - completed
  workflow_dispatch: # 允许手动触发

jobs:
  sync-gh-pages:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0   # 拉取完整历史，保证可以 push

      - name: Setup ossutil v2
        run: |
          # 下载并设置 ossutil v2
          curl -o ossutil.zip https://gosspublic.alicdn.com/ossutil/v2/2.1.2/ossutil-2.1.2-linux-amd64.zip
          unzip ossutil.zip
          cd ossutil-2.1.2-linux-amd64
          chmod 755 ossutil
          mv ossutil /usr/local/bin/ && sudo ln -s /usr/local/bin/ossutil /usr/bin/ossutil
          ossutil version

      - name: Mirror gh-pages to OSS (upload + delete stale objects)
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          sudo ossutil sync . oss://cn-rdk-front-prod/rdk_s_doc/ \
            -e https://d-robotics.cc \
            -i $OSS_ACCESS_KEY_ID \
            -k $OSS_ACCESS_KEY_SECRET \
            --region cn-beijing \
            --update \
            --delete \
            -f \
            --retry-times=3

      - name: Remove known legacy path prefixes (extra cleanup)
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          LEGACY_PREFIXES=(
            "Quick_start"
            "en/Quick_start"
          )
          for prefix in "${LEGACY_PREFIXES[@]}"; do
            echo "Removing legacy prefix: rdk_s_doc/${prefix}/"
            sudo ossutil rm -r "oss://cn-rdk-front-prod/rdk_s_doc/${prefix}/" \
              -e https://d-robotics.cc \
              -i $OSS_ACCESS_KEY_ID \
              -k $OSS_ACCESS_KEY_SECRET \
              --region cn-beijing \
              -f \
              || true
          done
